<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Socratic Dialogue button</title>
</head>
<body>
    <style>
        img {
            width: 500px;
            height: 500px;
        }
        button {
            border: none;
            background-color: white;
            width: 100%;
            height: 100%;
        }
        h1 {
            font-family: Impact, Haettenschweiler, 'Arial Narrow Bold', sans-serif;
            text-align: center;
            font-size: 4em;
        }
        .wrapper {
            width: fit-content;
            height: fit-content;
            margin-inline: auto;
        }
    </style>
    <h1>PRESS FOR LAUGHS</h1>
    <div class="wrapper">
        <button id="play-laugh"><img src="red-button-isolated-on-white-background-free-vector.jpg" /></button>
    </div>
    <script>
        const laugh_button = document.getElementById("play-laugh")
        const laughing_sound = new Audio('sitcom-laughing-1.mp3')
        laugh_button.addEventListener('click', () => {
            laughing_sound.play()
        })
    </script>
</body>
</html>
